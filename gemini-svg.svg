<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep Enterprise Slate -->
  <rect width="512" height="512" rx="112" fill="#0F172A"/>
  
  <!-- Glowing AI Aura -->
  <circle cx="256" cy="180" r="140" fill="#38BDF8" opacity="0.15" filter="blur(40px)"/>

  <!-- Academic Cap Subsystem (Shifted Up for Typography) -->
  <g transform="translate(0, -60)">
    <!-- Cap Top -->
    <polygon points="256,140 390,210 256,280 122,210" fill="#38BDF8"/>
    <!-- Cap Base (3D Depth) -->
    <polygon points="152,225 152,320 256,390 360,320 360,225 256,295" fill="#0284C7"/>
    <!-- Tassel -->
    <rect x="375" y="210" width="8" height="80" rx="4" fill="#7DD3FC"/>
    <circle cx="379" cy="300" r="12" fill="#7DD3FC"/>
    <!-- AI Core Node -->
    <circle cx="256" cy="210" r="18" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="256" cy="210" r="8" fill="#0EA5E9"/>
  </g>

  <!-- Typography Architecture -->
  <!-- SIAKAD Text -->
  <text x="256" y="380" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="48" fill="#38BDF8" text-anchor="middle" letter-spacing="6">SIAKAD</text>
  
  <!-- DKN Text (Massive & Bold) -->
  <text x="256" y="455" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="82" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">DKN</text>
</svg>
